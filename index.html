<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Lotto 大樂透開獎模擬</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js"></script>
    <link rel="stylesheet" href="index.css">
    <script src="JS.js"></script>
</head>
<body>

<div class="main-card">
    <h1>大樂透開獎摟</h1>

    <div class="lotto-container" id="display-area">
        <!-- 初始顯示空球或提示 -->
        <p style="color: #95a5a6;">請點擊按鈕進行開獎</p>
    </div>

    <button class="draw-btn" onclick="drawLotto()">
        <span class="icon">🎲</span> 立即開獎
    </button>

    <div class="info-footer">
        <p>前六顆為正獎，最後一顆為特別號</p>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
